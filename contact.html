<body>

<div class="mt-5 pt-5"></div>

<section class="container text-center my-5">
  <h2 class="section-title">צור קשר</h2>
  
  <form id="contactForm" class="mx-auto mt-4" style="max-width: 500px;">
    
    <div class="mb-3">
      <label class="form-label text-end w-100 fw-bold">שם מלא</label>
      <input type="text" id="name" class="form-control" placeholder="הכנס שם כאן" required>
    </div>
    
    <div class="mb-3">
      <label class="form-label text-end w-100 fw-bold">הודעה</label>
      <textarea id="msg" class="form-control" rows="4" placeholder="כתוב את הודעתך כאן" required></textarea>
    </div>
    
    <button type="submit" class="btn btn-primary w-100 fw-bold">שלח</button>
  </form>

  <div class="text-center mt-5">
    <a href="https://www.kinneret.ac.il/en/" target="_blank" class="btn btn-success">
      לאתר המכללה שלנו בגוגל
    </a>
  </div>
</section>


<script>
    // 1. הגדרות החיבור לפיירבייס (זה מה שהיה חסר בדפים האחרים!)
    const firebaseConfig = {
        apiKey: "AIzaSyB7EtdQumROer8xuzWu9wffjEvQz8XdbNU",
        authDomain: "rubotunnel.firebaseapp.com",
        databaseURL: "https://rubotunnel-default-rtdb.firebaseio.com",
        projectId: "rubotunnel",
        storageBucket: "rubotunnel.firebasestorage.app",
        messagingSenderId: "211308486888",
        appId: "1:211308486888:web:9d8e8b7594fd646898a95d"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }

    // 2. פונקציית ההתנתקות המקורית שלך
    function logout() {
        firebase.auth().signOut().then(() => {
            console.log("המשתמש התנתק בהצלחה");
            window.location.href = "register.html"; 
        }).catch((error) => {
            console.error("שגיאה בהתנתקות:", error);
            alert("אירעה שגיאה בזמן ההתנתקות.");
        });
    }


  // --- הסקריפט של WhatsApp שביקשת להוסיף ---
  const WHATSAPP_NUMBER = "972536261026"; 

  document.getElementById("contactForm").addEventListener("submit", function (e) {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const msg = document.getElementById("msg").value.trim();

    // בניית ההודעה (התאמתי לשני השדות שיש בטופס שלך: שם והודעה)
    const text =
`צור קשר - הודעה חדשה:
שם: ${name || "-"}
הודעה: ${msg || "-"}`;

    const encoded = encodeURIComponent(text);

    let url = "";
    if (WHATSAPP_NUMBER && WHATSAPP_NUMBER.trim() !== "") {
      // שולח למספר מוגדר
      url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encoded}`;
    } else {
      // פותח WhatsApp Web עם הודעה מוכנה
      url = `https://api.whatsapp.com/send?text=${encoded}`;
    }

    window.open(url, "_blank");
  });
</script>
</body>
</html>
