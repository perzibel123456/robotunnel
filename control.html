<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>שליטה על הרובוט - ROBOTUNNEL</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>




    
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center fw-bold" href="index.html">
      <img src="logo.png" alt="Logo" width="60" class="ms-2"> ROBOTUNNEL
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="register.html">כניסה</a></li>
        <li class="nav-item"><a class="nav-link " href="index.html">בית</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">אודות</a></li>
        <li class="nav-item"><a class="nav-link" href="gallery.html">גלריה</a></li>
        <li class="nav-item"><a class="nav-link " href="contact.html">צור קשר</a></li>
        <li id="control" class="nav-item"><a class="btn btn-warning btn-sm ms-lg-3 text-dark fw-bold active" href="control.html">ממשק שליטה</a></li>
        <li id="scan" class="nav-item"><a class="nav-link " href="scan.html"> scan</a></li>
        <li class="nav-item border-top border-lg-0 mt-2 mt-lg-0">
            <a class="nav-link text-danger fw-bold" href="#" id="logoutBtn" onclick="logout()">
                <i class="bi bi-box-arrow-right"></i> התנתקות
            </a>
        </li>
      </ul>
    </div>
  </div>
</nav>




<div class="mt-5 pt-4"></div>

<section class="container my-4">
    <h2 class="text-center mb-4 font-weight-bold">ממשק שליטה ובקרה</h2>

    <div class="controller-wrapper">
        <div class="video-section container text-center mb-4"> 
            <div class="ratio ratio-16x9 border border-secondary rounded bg-dark mx-auto" style="max-width: 640px;">
                <img src="" id="ipcam" alt="ממתין למצלמה..." style="object-fit: contain;">
            </div>
        </div>

        <div class="control-panel mx-auto mb-4" style="max-width: 640px;">
            <h5 class="text-warning mb-3">מצבי מערכת וסריקה</h5>
            <div class="row g-2">
                <div class="col-6">
                    <button id="btn-scan-mode" class="btn btn-outline-info w-100 fw-bold py-3" onclick="updateScanSystem('mode')">
                        <i class="bi bi-cpu ms-1"></i> מצב ידני 
                    </button>
                </div>
                <div class="col-6">
                    <button id="btn-scan-run" class="btn btn-outline-warning w-100 fw-bold py-3" onclick="updateScanSystem('run')" disabled>
                        <i class="bi bi-radar ms-1"></i> הפעל סריקה 
                    </button>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="control-panel h-100">
                    <h5 class="mb-3">תנועה</h5>
                    <div class="d-pad">
                        <button id="mob-W" class="btn btn-outline-light">W</button>
                        <button id="mob-A" class="btn btn-outline-light">A</button>
                        <button id="mob-S" class="btn btn-outline-light">S</button>
                        <button id="mob-D" class="btn btn-outline-light">D</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="control-panel h-100">
                    <h6 class="text-center">מהירות </h6>
                    <div class="btn-group w-100 mb-4" dir="ltr">
                        <button id="sp-stop" class="btn btn-outline-danger btn-speed" data-speed="0">stop</button>
                        <button id="sp-go" class="btn btn-outline-secondary btn-speed" data-speed="8">go</button>
                    </div>

                    <h6 class="text-center">זווית מצלמה</h6>
                    <div class="btn-group w-100" dir="ltr">
                        <button class="btn btn-outline-primary btn-servo" data-servo="32">שמאל </button>
                        <button class="btn btn-outline-primary btn-servo" data-servo="0">מרכז </button>
                        <button class="btn btn-outline-primary btn-servo" data-servo="16">ימין</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <h6 class="text-center mt-4">תאורת מצלמה</h6>
    <div class="text-center">
        <button id="btn-flash" class="btn btn-outline-warning w-100 py-3 fw-bold">
            <i class="bi"></i> הפעל פנס
        </button>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="control.js"></script>

<script>
function logout() {
    firebase.auth().signOut().then(() => {
        // --- התנתקות הצליחה ---
        console.log("המשתמש התנתק בהצלחה");
        
        // העברה לדף ההתחברות (שנה את הכתובת אם הדף שלך נקרא אחרת)
        window.location.href = "register.html"; 
        
    }).catch((error) => {
        // --- אירעה שגיאה ---
        console.error("שגיאה בהתנתקות:", error);
        alert("אירעה שגיאה בזמן ההתנתקות.");
    });
}
</script>

</body>
</html>
